name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.0

      - name: Tidy
        run: go mod tidy

      - name: Build
        run: go build ./cmd/*.go

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: blnk
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      typesense:
        image: typesense/typesense:29.0
        env:
          TYPESENSE_API_KEY: blnk-api-key
          TYPESENSE_DATA_DIR: /tmp
        ports:
          - 8108:8108
        options: >-
          --health-cmd "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8108 && printf \"GET /health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n\" >&3 && grep -q \"200 OK\" <&3'"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 5

      localstack:
        image: localstack/localstack:4.0.3
        env:
          SERVICES: s3
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.0

      - name: Tidy
        run: go mod tidy

      - name: Migrate Database
        run: go run ./cmd migrate up
        env:
          BLNK_DATA_SOURCE_DNS: postgres://postgres@localhost:5432/blnk?sslmode=disable
          BLNK_REDIS_DNS: localhost:6379

      - name: Test
        run: go test -v -p 1 ./...
        env:
          BLNK_TYPESENSE_DNS: http://localhost:8108
          BLNK_S3_ENDPOINT: http://localhost:4566
          BLNK_S3_BUCKET_NAME: test-bucket
          BLNK_S3_REGION: us-east-1
          BLNK_AWS_ACCESS_KEY_ID: test
          BLNK_AWS_SECRET_ACCESS_KEY: test

  race:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: blnk
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      typesense:
        image: typesense/typesense:29.0
        env:
          TYPESENSE_API_KEY: blnk-api-key
          TYPESENSE_DATA_DIR: /tmp
        ports:
          - 8108:8108
        options: >-
          --health-cmd "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8108 && printf \"GET /health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n\" >&3 && grep -q \"200 OK\" <&3'"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 5

      localstack:
        image: localstack/localstack:4.0.3
        env:
          SERVICES: s3
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.0

      - name: Tidy
        run: go mod tidy

      - name: Migrate Database
        run: go run ./cmd migrate up
        env:
          BLNK_DATA_SOURCE_DNS: postgres://postgres@localhost:5432/blnk?sslmode=disable
          BLNK_REDIS_DNS: localhost:6379

      - name: Test (race detector)
        run: go test -race -p 1 ./...
        env:
          BLNK_TYPESENSE_DNS: http://localhost:8108
          BLNK_S3_ENDPOINT: http://localhost:4566
          BLNK_S3_BUCKET_NAME: test-bucket
          BLNK_S3_REGION: us-east-1
          BLNK_AWS_ACCESS_KEY_ID: test
          BLNK_AWS_SECRET_ACCESS_KEY: test
