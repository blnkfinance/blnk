apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: blnk
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'blnk-server'
        # Uncomment to authenticate when metrics_bearer_token is configured in blnk.json:
        # authorization:
        #   type: Bearer
        #   credentials: '<your-metrics-bearer-token>'
        static_configs:
          - targets: ['server:5001']
      - job_name: 'blnk-worker'
        # authorization:
        #   type: Bearer
        #   credentials: '<your-metrics-bearer-token>'
        static_configs:
          - targets: ['worker:5004']
